name: Compare and Extract Modified Files

on:
  workflow_dispatch:
    inputs:
      official_image:
        description: '官方镜像 (例如 emby/embyserver:4.10.0.2)'
        required: true
        default: 'emby/embyserver:4.10.0.2'
      cracked_image:
        description: '破解镜像 (例如 amilys/embyserver:beta)'
        required: true
        default: 'amilys/embyserver:beta'

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull images
        run: |
          docker pull ${{ github.event.inputs.official_image }}
          docker pull ${{ github.event.inputs.cracked_image }}

      - name: Create containers and export filesystems
        run: |
          # 创建临时容器
          docker create --name official ${{ github.event.inputs.official_image }}
          docker create --name cracked ${{ github.event.inputs.cracked_image }}
          # 导出文件系统
          mkdir -p official_fs cracked_fs
          docker export official | tar -C official_fs -xf -
          docker export cracked | tar -C cracked_fs -xf -
          # 清理容器
          docker rm official cracked

      - name: Find modified files
        run: |
          # 递归对比，只列出不同的文件（排除 dev, proc, sys 等无关目录）
          diff -rq official_fs cracked_fs 2>/dev/null | grep -E '^Only in cracked_fs|^Files .* differ' > diff.txt
          echo "=== diff.txt ==="
          cat diff.txt
          # 提取 cracked_fs 中新增或修改的文件路径（去掉前缀 cracked_fs/）
          grep -E '^Only in cracked_fs|^Files .* differ' diff.txt | \
            sed -E 's/^Only in cracked_fs(.*): /cracked_fs\1\//; s/^Files cracked_fs(.*) and official_fs.*/cracked_fs\1/' | \
            sed 's/^cracked_fs//' | sort -u > file-list.txt
          echo "=== file-list.txt ==="
          cat file-list.txt

      - name: Extract modified files
        run: |
          mkdir -p extracted
          while IFS= read -r file; do
            if [ -n "$file" ] && [ -f "cracked_fs/$file" ]; then
              mkdir -p "extracted/$(dirname "$file")"
              cp "cracked_fs/$file" "extracted/$file"
              echo "Extracted: $file"
            fi
          done < file-list.txt
          echo "Total extracted files: $(find extracted -type f | wc -l)"

      - name: Upload extracted files
        uses: actions/upload-artifact@v4
        with:
          name: modified-files
          path: extracted/
          retention-days: 7
